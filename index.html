
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/responsive.css">

  <title>Frontend Mentor | NFT preview card component</title>
</head>
<body>
  <main class="container">
    <div class="view-img">
      <img src="images/icon-view.svg" alt="view">
    </div>
    <div class="cube">
      <img class="cube-img" src="images/image-equilibrium.jpg" alt="CUBE">
    </div>
    <div class="text">
      <h1>Equilibrium #3429</h1>
      <p>Our Equilibrium collection promotes balance and calm.</p>
    </div>
    <div class="ETH">
      <h2><img src="images/icon-ethereum.svg" alt="ETH">0.041 ETH</h2>
      <p><img src="images/icon-clock.svg" alt="CLOCK"> 3 days left</p>
    </div>
    <div class="line"><hr></div>
    <div class="creation">
      <img src="images/image-avatar.png" alt="AVATAR">
      <p>Creation of <b>Jules Wyvern</b></p>
    </div>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://www.linkedin.com/feed/" target="_blank">João Vitor</a>.
    </div>
  </main>
</body>
</html>
